version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: creatorchain-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-creatorchain}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/config/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: creatorchain-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  ai-service:
    build: ./ai-service
    container_name: creatorchain-ai
    ports:
      - "5000:5000"
    volumes:
      - ./ai-service:/app
      - upload_temp:/tmp/uploads
    environment:
      - FLASK_ENV=development

  backend:
    build: ./backend
    container_name: creatorchain-backend
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/creatorchain
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-service:5000
      PORT: 4000
      JWT_SECRET: dev-secret-key
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - /app/node_modules
      - upload_temp:/tmp/uploads

  frontend:
    build: ./frontend
    container_name: creatorchain-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_APP_NAME: CreatorChain
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  pgdata:
  upload_temp:
